openapi: "3.1.0"
info:
  title: korpus
  version: "1.0.0"

paths:
  /healthz:
    get:
      operationId: Healthz
      responses:
        "200":
          description: OK
        "503":
          description: Service Unavailable

  /api/status:
    get:
      operationId: GetStatus
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /api/clusters:
    get:
      operationId: ListClusters
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/kinds:
    get:
      operationId: ListKinds
      parameters:
        - name: cluster
          in: query
          schema:
            type: string
        - name: namespace
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/namespaces:
    get:
      operationId: ListNamespaces
      parameters:
        - name: cluster
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/resources:
    get:
      operationId: ListResources
      parameters:
        - name: cluster
          in: query
          schema:
            type: string
        - name: kind
          in: query
          schema:
            type: string
        - name: namespace
          in: query
          schema:
            type: string
        - name: labels
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResourceMeta"

  /api/resources/{cluster}/{kind}/{namespace}/{name}:
    get:
      operationId: GetResource
      parameters:
        - name: cluster
          in: path
          required: true
          schema:
            type: string
        - name: kind
          in: path
          required: true
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: Not Found

  /api/resources/{cluster}/{kind}/{namespace}/{name}/history:
    get:
      operationId: GetResourceHistory
      parameters:
        - name: cluster
          in: path
          required: true
          schema:
            type: string
        - name: kind
          in: path
          required: true
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: n
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"
        "404":
          description: Not Found

  /api/resources/{cluster}/{kind}/{namespace}/{name}/diff:
    get:
      operationId: GetResourceDiff
      parameters:
        - name: cluster
          in: path
          required: true
          schema:
            type: string
        - name: kind
          in: path
          required: true
          schema:
            type: string
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          required: true
          schema:
            type: string
        - name: to
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiffResult"
        "400":
          description: Bad Request
        "404":
          description: Not Found

  /api/query:
    get:
      operationId: QueryResources
      parameters:
        - name: kind
          in: query
          required: true
          schema:
            type: string
        - name: namespace
          in: query
          schema:
            type: string
        - name: cluster
          in: query
          schema:
            type: string
        - name: labels
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResourceMeta"
        "400":
          description: Bad Request

components:
  schemas:
    ResourceMeta:
      type: object
      required:
        - cluster
        - kind
        - name
        - namespace
      properties:
        cluster:
          type: string
        kind:
          type: string
        name:
          type: string
        namespace:
          type: string
        labels:
          nullable: true
          type: object
          additionalProperties:
            type: string
        creationTimestamp:
          type: string

    ClusterStatus:
      type: object
      required:
        - name
        - resourceCount
        - lastPullErr
      properties:
        name:
          type: string
        lastPullAt:
          nullable: true
          type: string
          format: date-time
        lastPullErr:
          type: string
        resourceCount:
          type: integer

    StatusResponse:
      type: object
      required:
        - clusters
      properties:
        clusters:
          type: array
          items:
            $ref: "#/components/schemas/ClusterStatus"

    HistoryEntry:
      type: object
      required:
        - sha
        - timestamp
        - message
      properties:
        sha:
          type: string
        timestamp:
          type: string
          format: date-time
        message:
          type: string

    DiffResult:
      type: object
      required:
        - before
        - after
      properties:
        before:
          type: string
        after:
          type: string
