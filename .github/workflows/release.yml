name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Set image tags in manifests
        working-directory: manifests
        env:
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          REPO_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          kustomize edit set image ghcr.io/${REPO_LOWER}:release-${REF_NAME}
          kustomize edit set image ghcr.io/${REPO_LOWER}-server:release-${REF_NAME}

      - name: Build install.yaml
        run: kustomize build ./manifests > install.yaml

      - uses: softprops/action-gh-release@v2
        with:
          files: install.yaml
          generate_release_notes: true
