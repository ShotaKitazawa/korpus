name: Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Get Go version for Docker
        id: go-version
        run: echo "value=$(mise current go | grep -oE '^[0-9]+\.[0-9]+')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=pr,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=branch,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') }}
            type=ref,event=tag,prefix=release-,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.korpus
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GO_VERSION=${{ steps.go-version.outputs.value }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Get versions for Docker
        id: versions
        run: |
          echo "go=$(mise current go | grep -oE '^[0-9]+\.[0-9]+')" >> "$GITHUB_OUTPUT"
          echo "node=$(mise current node | grep -oE '^[0-9]+')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}-server
          tags: |
            type=ref,event=pr,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=branch,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') }}
            type=ref,event=tag,prefix=release-,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=${{ steps.versions.outputs.go }}
            NODE_VERSION=${{ steps.versions.outputs.node }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server
